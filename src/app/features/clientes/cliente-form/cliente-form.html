<div class="p-4 max-w-2xl">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">
    {{ editando() ? 'Editar Cliente' : 'Novo Cliente' }}
  </h1>

  @if (loading()) {
    <p class="text-gray-500">Carregando...</p>
  } @else {
    @if (erro()) {
      <div class="bg-red-100 text-red-700 border border-red-300 rounded p-3 mb-4">
        {{ erro() }}
      </div>
    }
    <form (ngSubmit)="salvar()" #form="ngForm" novalidate>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Nome *</label>
          <input
            type="text"
            [(ngModel)]="cliente.nome"
            name="nome"
            required
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">CPF *</label>
          <input
            type="text"
            [(ngModel)]="cliente.cpf"
            name="cpf"
            required
            maxlength="14"
            placeholder="000.000.000-00"
            appMask="cpf"
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Telefone *</label>
          <input
            type="text"
            [(ngModel)]="cliente.telefone"
            name="telefone"
            required
            maxlength="15"
            placeholder="(00) 00000-0000"
            appMask="telefone"
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          />
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Endereço *</label>
          <input
            type="text"
            [(ngModel)]="cliente.endereco"
            name="endereco"
            required
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Bairro *</label>
          <input
            type="text"
            [(ngModel)]="cliente.bairro"
            name="bairro"
            required
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">CEP *</label>
          <input
            type="text"
            [(ngModel)]="cliente.cep"
            name="cep"
            required
            maxlength="9"
            placeholder="00000-000"
            appMask="cep"
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Cidade *</label>
          <input
            type="text"
            [(ngModel)]="cliente.cidade"
            name="cidade"
            required
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Estado *</label>
          <input
            type="text"
            [(ngModel)]="cliente.estado"
            name="estado"
            required
            maxlength="2"
            placeholder="SP"
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          />
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button
          type="submit"
          [disabled]="salvando() || form.invalid"
          class="bg-orange-500 hover:bg-orange-600 disabled:opacity-50 text-white px-6 py-2 rounded font-medium transition-colors"
        >
          {{ salvando() ? 'Salvando...' : 'Salvar' }}
        </button>
        <button
          type="button"
          (click)="cancelar()"
          class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded font-medium transition-colors"
        >
          Cancelar
        </button>
      </div>
    </form>
  }
</div>
