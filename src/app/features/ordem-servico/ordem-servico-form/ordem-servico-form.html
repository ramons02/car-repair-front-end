<div class="p-4 max-w-2xl">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">
    {{ editando() ? 'Editar Ordem de Serviço' : 'Nova Ordem de Serviço' }}
  </h1>

  @if (loading()) {
    <p class="text-gray-500">Carregando...</p>
  } @else {
    @if (erro()) {
      <div class="bg-red-100 text-red-700 border border-red-300 rounded p-3 mb-4">
        {{ erro() }}
      </div>
    }
    <form (ngSubmit)="salvar()" #form="ngForm" novalidate>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Cliente *</label>
          <select
            [(ngModel)]="ordem.clienteId"
            name="clienteId"
            required
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          >
            <option value="">-- Selecione --</option>
            @for (cliente of clientes; track cliente.id) {
              <option [value]="cliente.id">{{ cliente.nome }} — {{ cliente.cpf }}</option>
            }
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Veículo *</label>
          <select
            [(ngModel)]="ordem.veiculoId"
            name="veiculoId"
            required
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          >
            <option value="">-- Selecione --</option>
            @for (veiculo of veiculos; track veiculo.id) {
              <option [value]="veiculo.id">{{ veiculo.placa }} — {{ veiculo.marca }} {{ veiculo.modelo }}</option>
            }
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Data de Entrada *</label>
          <input
            type="date"
            [(ngModel)]="ordem.dataEntrada"
            name="dataEntrada"
            required
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Data de Saída</label>
          <input
            type="date"
            [(ngModel)]="ordem.dataSaida"
            name="dataSaida"
            [class.border-red-400]="saidaInvalida"
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400"
          />
          @if (saidaInvalida) {
            <p class="text-red-600 text-xs mt-1">Data de saída não pode ser anterior à data de entrada.</p>
          }
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Problema *</label>
          <textarea
            [(ngModel)]="ordem.problema"
            name="problema"
            required
            rows="3"
            placeholder="Descreva o problema relatado pelo cliente..."
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400 resize-none"
          ></textarea>
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Observações</label>
          <textarea
            [(ngModel)]="ordem.observacoes"
            name="observacoes"
            rows="2"
            placeholder="Observações adicionais (opcional)..."
            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-400 resize-none"
          ></textarea>
        </div>

      </div>

      <div class="flex gap-3 mt-6">
        <button
          type="submit"
          [disabled]="salvando() || form.invalid || saidaInvalida"
          class="bg-orange-500 hover:bg-orange-600 disabled:opacity-50 text-white px-6 py-2 rounded font-medium transition-colors"
        >
          {{ salvando() ? 'Salvando...' : 'Salvar' }}
        </button>
        <button
          type="button"
          (click)="cancelar()"
          class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2 rounded font-medium transition-colors"
        >
          Cancelar
        </button>
      </div>
    </form>
  }
</div>
